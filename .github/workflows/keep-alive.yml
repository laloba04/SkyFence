name: Keep monitoring awake

# Los servicios free de Render se duermen tras 15 min sin tráfico entrante.
# Este ping periódico mantiene despiertos Prometheus y Grafana para que el
# histórico de métricas no se pierda (el disco del free tier es efímero).
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Prometheus y Grafana
        run: |
          curl -sf -o /dev/null --max-time 60 https://skyfence-prometheus.onrender.com/-/healthy || echo "Prometheus no responde"
          curl -sf -o /dev/null --max-time 60 https://skyfence-grafana.onrender.com/api/health || echo "Grafana no responde"

# Actualizaciones automáticas de dependencias (issue #45).
# Dependabot abre PRs semanales cuando hay versiones nuevas o vulnerabilidades;
# las minor/patch se agrupan en un solo PR para reducir ruido. El CI corre en
# cada PR, así que basta revisar y mergear.
version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      minor-y-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      minor-y-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

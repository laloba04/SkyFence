spring.application.name=skyfence

# PostgreSQL (required via environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=skyfence-backend
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=SkyFence
info.app.version=1.0.0
info.app.description=Real-time aircraft intrusion detection

# Actuator CORS (Requerido para que el frontend React pueda leer la salud)
management.endpoints.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://sky-fence.vercel.app
management.endpoints.web.cors.allowed-methods=GET,OPTIONS

# OpenSky
opensky.api.url=${OPENSKY_API_URL:https://opensky-network.org/api}
geofence.check.interval=${GEOFENCE_CHECK_INTERVAL:10000}
opensky.api.client-id=${OPENSKY_CLIENT_ID:}
opensky.api.client-secret=${OPENSKY_CLIENT_SECRET:}

spring.application.name=skyfence

# PostgreSQL (required via environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=skyfence-backend
management.info.env.enabled=true
info.app.name=SkyFence
info.app.version=1.0.0
info.app.description=Real-time aircraft intrusion detection

# Actuator CORS - origins defined per profile (dev/prod)
management.endpoints.web.cors.allowed-methods=GET,OPTIONS

# JWT
jwt.secret=${JWT_SECRET:skyfence-dev-secret-key-must-be-at-least-32-chars}

# Admin seed (credentials via environment variables)
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:}
jwt.expiration=86400000

# Stripe
stripe.api.key=${STRIPE_SECRET_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
stripe.price.pro=${STRIPE_PRICE_PRO:}
stripe.success.url=${STRIPE_SUCCESS_URL:https://localhost:5173/subscription/success}
stripe.cancel.url=${STRIPE_CANCEL_URL:https://localhost:5173/subscription/cancel}

# Flight data API (adsb.fi)
flightdata.api.url=${FLIGHTDATA_API_URL:https://opendata.adsb.fi}
flightdata.api.enabled=${FLIGHTDATA_API_ENABLED:true}
geofence.check.interval=${GEOFENCE_CHECK_INTERVAL:10000}

# MQTT (fuente alternativa: sensores IoT). Desactivado por defecto.
# Puede convivir con la API o sustituirla (flightdata.api.enabled=false).
skyfence.mqtt.enabled=${SKYFENCE_MQTT_ENABLED:false}
skyfence.mqtt.broker-url=${SKYFENCE_MQTT_BROKER_URL:tcp://localhost:1883}
skyfence.mqtt.topic=${SKYFENCE_MQTT_TOPIC:skyfence/sensors/aircraft}
skyfence.mqtt.client-id=${SKYFENCE_MQTT_CLIENT_ID:skyfence-backend}
skyfence.mqtt.username=${SKYFENCE_MQTT_USERNAME:}
skyfence.mqtt.password=${SKYFENCE_MQTT_PASSWORD:}
skyfence.mqtt.qos=${SKYFENCE_MQTT_QOS:1}

# Resilience4j - Retry (adsb.fi)
resilience4j.retry.instances.flightData.max-attempts=3
resilience4j.retry.instances.flightData.wait-duration=2s
resilience4j.retry.instances.flightData.enable-exponential-backoff=true
resilience4j.retry.instances.flightData.exponential-backoff-multiplier=2

# Resilience4j - Circuit Breaker (adsb.fi)
resilience4j.circuitbreaker.instances.flightData.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.flightData.sliding-window-size=5
resilience4j.circuitbreaker.instances.flightData.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.flightData.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.flightData.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.flightData.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.flightData.register-health-indicator=true
management.health.circuitbreakers.enabled=true

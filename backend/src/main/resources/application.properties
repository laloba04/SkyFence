spring.application.name=dronetrack

# PostgreSQL (override with environment variables in non-local environments)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dronetrack}
spring.datasource.username=${DB_USERNAME:dronetrack}
spring.datasource.password=${DB_PASSWORD:change-me}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# OpenSky
opensky.api.url=${OPENSKY_API_URL:https://opensky-network.org/api}
geofence.check.interval=${GEOFENCE_CHECK_INTERVAL:10000}

# === PROD PROFILE ===
server.port=${PORT:8080}
# Render termina TLS en su proxy: sin esto Spring cree que la petición es http
# y no emitiría el header HSTS (Strict-Transport-Security)
server.forward-headers-strategy=framework
# Minimal logging
logging.level.root=WARN
logging.level.com.skyfence=INFO

# Use validate instead of update in prod to avoid slow schema diffing on startup
spring.jpa.hibernate.ddl-auto=validate

# Connection pool tuning for faster startup
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000

# Health details only for authenticated users
management.endpoint.health.show-details=always

# Actuator CORS - production frontend only
management.endpoints.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://sky-fence.vercel.app}

# CORS - production frontend only
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://sky-fence.vercel.app}

version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - skyfence_network

  backend:
    build: ./backend
    env_file:
      - .env
    ports:
      - '8080:8080'
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SKYFENCE_MQTT_ENABLED: ${SKYFENCE_MQTT_ENABLED:-false}
      SKYFENCE_MQTT_BROKER_URL: ${SKYFENCE_MQTT_BROKER_URL:-tcp://mosquitto:1883}
      FLIGHTDATA_API_ENABLED: ${FLIGHTDATA_API_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - skyfence_network

  # Broker MQTT de desarrollo: solo arranca con --profile mqtt
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: skyfence-mosquitto
    profiles: ["mqtt"]
    ports:
      - '1883:1883'
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - skyfence_network

  frontend:
    build: ./frontend
    ports:
      - '3000:8080'
    depends_on:
      - backend
    networks:
      - skyfence_network

networks:
  skyfence_network:
    name: skyfence_network

volumes:
  postgres_data:
